name: hehe

on:
  schedule:
    - cron: '0 */5 * * *' 
  push:
    branches:
      - main
  
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: nodejs
        uses: actions/setup-node@v2
        with:
          node-version: '22'  

      - name: apt
        run: |
          sudo apt update -y
          sudo apt upgrade -y
          sudo apt install -y ffmpeg neofetch sox

      - name: Sc
        run: git clone ${{ secrets.sc1 }}

      - name: npm
        run: |
          cd wa1
          npm install --force

      - name: run
        run: |
          cd wa1
          node ghact.js
